<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกเอกสาร HR</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1f2937; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #4b5563; font-size: 14px; }
        input[type="text"], input[type="date"], input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-family: inherit;
        }
        
        /* สไตล์สำหรับ Chip Toggle */
        .chip-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .chip { flex: 1; text-align: center; padding: 10px; border: 1px solid #10b981; border-radius: 20px; color: #10b981; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .chip.active { background-color: #10b981; color: white; }
        
        /* ซ่อนส่วนอัปโหลดไฟล์ไว้ก่อน */
        #uploadSection { display: none; background: #f9fafb; padding: 15px; border: 2px dashed #10b981; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        
        .submit-btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        
        /* Loading Overlay */
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>📝 บันทึกเอกสารใหม่</h2>
        <form id="hrForm">
            <div class="form-group">
                <label>ข้อความอ้างอิง (Raw Data / ชื่อเอกสาร / หน่วยงาน)</label>
                <input type="text" id="rawData" placeholder="เช่น Work Permit / กรมการจัดหางาน" required>
            </div>
            <div class="form-group">
                <label>แผนกที่รับผิดชอบ</label>
                <select id="department" required>
                    <option value="" disabled selected>เลือกแผนก...</option>
                    <option value="บุคคล">บุคคล</option>
                    <option value="บัญชี">บัญชี</option>
                    <option value="ขนส่ง">ขนส่ง</option>
                    <option value="จนท.จป">จนท.จป</option>
                    <option value="บริหาร">บริหาร</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>วันที่ออกเอกสาร</label>
                    <input type="date" id="issueDate" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>วันหมดอายุ</label>
                    <input type="date" id="expiryDate" required>
                </div>
            </div>
            <div class="form-group">
                <label>แจ้งเตือนล่วงหน้า (วัน)</label>
                <input type="number" id="alertDays" value="30" required>
            </div>

            <label>แนบไฟล์เอกสาร (Optional)</label>
            <div class="chip-group">
                <div class="chip active" id="chipNoFile" onclick="toggleFile('none')">❌ ไม่แนบไฟล์</div>
                <div class="chip" id="chipHasFile" onclick="toggleFile('attach')">📎 แนบไฟล์</div>
            </div>

            <div id="uploadSection">
                <input type="file" id="fileInput" accept="image/*,application/pdf">
                <p style="font-size: 12px; color: #6b7280; margin-top: 5px;">รองรับรูปภาพ และ PDF (ไม่เกิน 5MB)</p>
            </div>

            <button type="button" class="submit-btn" id="submitBtn" onclick="submitForm()">💾 บันทึกข้อมูล</button>
        </form>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p>กำลังบันทึกข้อมูลและอัปโหลดไฟล์...</p>
    </div>

    <script>
        // 🔴 1. ใส่ Web App URL ของ Google Apps Script ที่ได้จากการ Deploy 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkHcKCsM853RD225LZ7wUnxnBZF1D5HoEXnJm7FaLBY8h12oppFDkYmERoQwoTs9cf6w/exec";
        
        // 🔴 2. ใส่ LIFF ID ของคุณ
        const LIFF_ID = "2010379470-zXEdvOrD";

        let currentUserId = "";
        let currentUserName = "";

        // เริ่มต้นการทำงานของ LIFF เมื่อเปิดหน้าเว็บ
        window.onload = function() {
            initializeLiff();
        };

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    currentUserId = profile.userId;
                    currentUserName = profile.displayName;
                } else {
                    // ถ้ารันในเบราว์เซอร์ปกติที่ไม่ได้ล็อกอิน LINE
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error: ", err);
                alert("ไม่สามารถเชื่อมต่อระบบ LINE ได้");
            }
        }

        // ฟังก์ชันสลับ UI ของ Chip เลือกแนบไฟล์
        function toggleFile(action) {
            const uploadSection = document.getElementById('uploadSection');
            const fileInput = document.getElementById('fileInput');
            
            if (action === 'attach') {
                document.getElementById('chipHasFile').classList.add('active');
                document.getElementById('chipNoFile').classList.remove('active');
                uploadSection.style.display = 'block';
            } else {
                document.getElementById('chipNoFile').classList.add('active');
                document.getElementById('chipHasFile').classList.remove('active');
                uploadSection.style.display = 'none';
                fileInput.value = ''; // ล้างค่าไฟล์ที่อาจจะเลือกไว้ทิ้ง
            }
        }

        // ฟังก์ชันแปลงไฟล์เป็น Base64
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // ฟังก์ชันส่งข้อมูล
        async function submitForm() {
            // เช็คว่ากรอกข้อมูลครบไหม
            if(!document.getElementById('hrForm').checkValidity()) {
                alert("กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน");
                return;
            }

            document.getElementById('loading').style.display = 'flex';
            document.getElementById('submitBtn').disabled = true;

            const isAttach = document.getElementById('chipHasFile').classList.contains('active');
            const fileInput = document.getElementById('fileInput');
            
            let fileBase64 = "";
            let fileName = "";
            let fileMimeType = "";

            // ถ้าเลือกแนบไฟล์และมีไฟล์ถูกเลือกจริง
            if (isAttach && fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                // เช็คขนาดไฟล์ไม่ให้เกิน 5MB
                if (file.size > 5 * 1024 * 1024) {
                    alert("ขนาดไฟล์เกิน 5MB กรุณาเลือกไฟล์ใหม่ค่ะ");
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('submitBtn').disabled = false;
                    return;
                }

                fileName = file.name;
                fileMimeType = file.type;
                fileBase64 = await getBase64(file);
            }

            // จัดเตรียมข้อมูลสำหรับส่งไปให้ Apps Script
            const payload = {
                action: "saveData",
                data: {
                    rawData: document.getElementById('rawData').value,
                    department: document.getElementById('department').value,
                    issueDate: document.getElementById('issueDate').value,
                    expiryDate: document.getElementById('expiryDate').value,
                    alertDays: document.getElementById('alertDays').value,
                    userId: currentUserId,         // 🌟 ส่ง UID
                    userName: currentUserName,     // 🌟 ส่งชื่อพนักงาน
                    fileBase64: fileBase64,        // 🌟 ส่งไฟล์ที่แปลงแล้ว
                    fileName: fileName,
                    fileMimeType: fileMimeType
                }
            };

            try {
                // ส่งข้อมูลผ่าน API
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    // mode: 'no-cors' จะใช้เมื่อติดปัญหา CORS แต่จะอ่านค่า return ไม่ได้
                    // แนะนำให้ Web App เซ็ตสิทธิ์เป็น "Anyone (ทุกคน)" เพื่อให้รับ POST ได้สมบูรณ์
                    body: JSON.stringify(payload)
                });

                document.getElementById('loading').style.display = 'none';
                
                // แจ้งเตือนและปิดหน้าต่าง LIFF กลับไปที่แชท
                alert("✅ บันทึกข้อมูลเรียบร้อยแล้วค่ะ!");
                liff.closeWindow(); 

            } catch (error) {
                console.error("Error:", error);
                alert("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง");
                document.getElementById('loading').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
